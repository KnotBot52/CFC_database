{{ define "main" }}
<h1 class="page-title">{{ .Title }}</h1>
<div class="content-list">
    {{ range .Pages }}
    <article class="card">
        <h2 class="card-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        <div class="card-meta">{{ .Date.Format "January 2, 2006" }}</div>
        <p>{{ .Summary }}</p>
    </article>
    {{ end }}
</div>
{{ end }}
